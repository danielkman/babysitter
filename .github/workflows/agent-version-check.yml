# Agent Version Check — daily scan for new agent CLI releases
#
# An agent discovers all supported agents from the atlas graph, checks for
# version updates, and creates PRs/issues for new versions.

name: Agent Version Check

on:
  push:
    branches: [main, staging]
    paths: ['.github/workflows/agent-version-check.yml']
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect versions but do not create PRs or issues'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-version-check
  cancel-in-progress: false

jobs:
  check-versions:
    name: Check Agent Versions
    runs-on: ubuntu-latest-l
    steps:
      - name: Generate a5c GitHub App token
        id: a5c-token
        continue-on-error: true
        uses: a5c-ai/generate-token-action@main

      - uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ steps.a5c-token.outputs.a5c_token || github.token }}

      - uses: a5c-ai/babysitter/packages/triggers@staging
        with:
          harness: codex
          provider: foundry
          model: gpt-5.5
          interaction-mode: bridged-hooks
          babysitter-plugin: 'true'
          max-turns: '9999'
          babysitter-prompt-prefix: '$babysitter:yolo '
          prompt: |
            You are an agent version tracker running a daily check for new agent CLI releases.
            ${{ inputs.dry_run == 'true' && 'DRY RUN MODE: report findings but do NOT create PRs or issues.' || '' }}

            Your goal: for EVERY agent in the atlas graph, check if there is a newer version
            than what is recorded, and if so, update the graph and open tracking issues.

            Work through these steps methodically. Cover ALL agents, not just a few.

            STEP 1: Build the atlas and agent-catalog so you can query the graph.
            ```
            npm run build --workspace=@a5c-ai/atlas
            npm run build --workspace=@a5c-ai/agent-catalog
            ```

            STEP 2: Query the graph for ALL plugin targets and their install methods.
            Use the agent-catalog SDK and also check the adapter source code for
            install commands. Build a complete list of every agent with its npm/pip
            package name. Do not hardcode — discover from the actual code and graph.

            STEP 3: For EACH agent discovered, check the latest published version.
            Use `npm view <package>@latest version` for npm packages. Search the web
            for agents not on npm. Record every result.

            STEP 4: Compare each discovered version against existing AgentVersion
            records in `packages/atlas/graph/agent-stack/agent-versions/`. Read
            the YAML files to see what is already recorded.

            STEP 5: For each NEW version not in the graph:
            - Search the web for release notes and changelog
            - Create or update the AgentVersion YAML file
            - Note any capability changes, new CLI flags, or breaking changes

            STEP 6: If any graph files were changed:
            - Rebuild atlas index
            - Create a branch, commit, and open a PR against staging

            STEP 7: For each new agent+version pair, open a GitHub issue titled
            "Assimilate <agent> v<version> into atlas graph" with label
            `agent-version-update,graph-update` (check for duplicates first).

            STEP 8: Print a final summary table covering ALL agents checked.

            IMPORTANT: You must cover every single agent in the graph, not just one or two.
            Process them systematically in a loop. Do not stop after the first agent. One PR for all the run.
          trigger-query: ''
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ steps.a5c-token.outputs.a5c_token || github.token }}
