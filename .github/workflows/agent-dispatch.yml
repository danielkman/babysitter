# Agent Dispatch — trigger babysitter agent from issue/PR comments
#
# Usage: Comment `/agent <prompt>` on any issue or PR.
# The agent determines the right process from issue labels, checks out
# the correct branch, and works autonomously.

name: Agent Dispatch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  agent:
    if: startsWith(github.event.comment.body, '/agent ')
    runs-on: ubuntu-latest-l
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: a5c-ai/babysitter/packages/triggers@main
        with:
          harness: claude
          provider: foundry
          model: gpt-5.5
          interaction-mode: bridged-hooks
          babysitter-plugin: 'true'
          babysitter-prompt-prefix: '/babysitter:call'
          max-turns: '9999'
          prompt: |
            You are triggered by a `/agent` command on issue #${{ github.event.issue.number }}: "${{ github.event.issue.title }}"
            Comment author: ${{ github.event.comment.user.login }}
            Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}
            Is PR: ${{ github.event.issue.pull_request && 'true' || 'false' }}

            BRANCH INSTRUCTIONS:
            - If this is a PR comment, checkout the PR branch and work on it directly.
            - If this is an issue comment, check if the issue has an associated open PR (search for PRs mentioning #${{ github.event.issue.number }}). If found, checkout that PR's branch.
            - If no associated PR exists, create a new branch `agent/issue-${{ github.event.issue.number }}`, commit and push your changes to it, then create a PR linking to issue #${{ github.event.issue.number }}.

            PROCESS INSTRUCTIONS:
            - Determine the right babysitter process to use from the process library based on the issue labels: ${{ join(github.event.issue.labels.*.name, ', ') }}
            - Search .a5c/process-library/ for processes that match the labels or the task description.
            - If no matching process exists, research the library for similar patterns and create an appropriate one.

            WORK INSTRUCTIONS:
            - Commit and push changes during work. Use descriptive commit messages.
            - After completing work, post a summary of what was done.

            User request: ${{ github.event.comment.body }}
          trigger-query: |
            event: issue_comment
            action: created
            body: /^\/agent /
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
