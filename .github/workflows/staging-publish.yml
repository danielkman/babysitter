name: Staging Publish

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  id-token: write

concurrency:
  group: staging-publish
  cancel-in-progress: false

jobs:
  validate_core:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Core Runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/core-logs

      - name: Check command surface sync
        run: |
          set -euo pipefail
          npm run check:plugin-commands 2>&1 | tee artifacts/core-logs/plugin-command-sync.log

      - name: Verify metadata
        run: |
          set -euo pipefail
          npm run verify:metadata 2>&1 | tee artifacts/core-logs/metadata.log

      - name: Architecture boundary gate
        run: |
          set -euo pipefail
          npm run test:architecture 2>&1 | tee artifacts/core-logs/architecture.log

      - name: Lint SDK
        run: |
          set -euo pipefail
          npm run lint --workspace=@a5c-ai/babysitter-sdk 2>&1 | tee artifacts/core-logs/lint.log

      - name: Build runtime graph
        run: |
          set -euo pipefail
          npm run build:runtime 2>&1 | tee artifacts/core-logs/runtime-build.log

      - name: SDK tests
        run: |
          set -euo pipefail
          npm run test:sdk 2>&1 | tee artifacts/core-logs/sdk-tests.log

      - name: agent-core tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/agent-core 2>&1 | tee artifacts/core-logs/agent-core-tests.log

      - name: babysitter-harness tests
        run: |
          set -euo pipefail
          npm run test --workspace=@a5c-ai/babysitter-agent 2>&1 | tee artifacts/core-logs/babysitter-harness-tests.log

      - name: Upload core validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-core-logs
          path: artifacts/core-logs
          if-no-files-found: warn

  validate_mux:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Mux Surfaces
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/mux-logs

      - name: Build SDK prerequisites
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee artifacts/mux-logs/sdk-prereqs-build.log
          for workspace in \
            @a5c-ai/agent-mux-observability \
            @a5c-ai/agent-mux-core \
            @a5c-ai/agent-mux-adapters \
            @a5c-ai/agent-mux-gateway \
            @a5c-ai/transport-mux \
            @a5c-ai/agent-mux-cli \
            @a5c-ai/agent-mux \
            @a5c-ai/triggers
          do
            npm run build --workspace="$workspace"
          done 2>&1 | tee artifacts/mux-logs/agent-mux-test-prereqs-build.log
          npm run build --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-build.log

      - name: Hooks-proxy unit tests
        run: |
          set -euo pipefail
          npm run test:hooks-mux 2>&1 | tee artifacts/mux-logs/hooks-mux-tests.log

      - name: agent-mux package tests
        run: |
          set -euo pipefail
          node scripts/agent-mux-build.cjs test packages/agent-mux/observability 2>&1 | tee artifacts/mux-logs/agent-mux-observability-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/core 2>&1 | tee artifacts/mux-logs/agent-mux-core-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/adapters 2>&1 | tee artifacts/mux-logs/agent-mux-adapters-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/harness-mock 2>&1 | tee artifacts/mux-logs/agent-mux-harness-mock-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/gateway 2>&1 | tee artifacts/mux-logs/agent-mux-gateway-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/cli 2>&1 | tee artifacts/mux-logs/agent-mux-cli-tests.log
          node scripts/agent-mux-build.cjs test packages/agent-mux/sdk 2>&1 | tee artifacts/mux-logs/agent-mux-sdk-tests.log
          npm run test:unit --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-tests.log
          npm run test:e2e --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-e2e.log
          npm run test:coverage --workspace=@a5c-ai/triggers 2>&1 | tee artifacts/mux-logs/triggers-coverage.log

      - name: Build and verify non-realtime agent-mux release artifacts
        run: |
          set -euo pipefail
          for workspace in \
            @a5c-ai/agent-catalog \
            @a5c-ai/agent-mux-observability \
            @a5c-ai/agent-mux-core \
            @a5c-ai/agent-mux-adapters \
            @a5c-ai/agent-mux-gateway \
            @a5c-ai/transport-mux \
            @a5c-ai/agent-mux-cli \
            @a5c-ai/agent-mux \
            @a5c-ai/agent-mux-tui \
            @a5c-ai/triggers
          do
            npm run build --workspace="$workspace"
          done 2>&1 | tee artifacts/mux-logs/agent-mux-release-build.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-core 2>&1 | tee artifacts/mux-logs/agent-mux-core-release.log
          npm run verify:release --workspace=@a5c-ai/agent-mux-tui 2>&1 | tee artifacts/mux-logs/agent-mux-tui-release.log

      - name: Validate transport-mux runtime owner
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-build.log
          npm run test --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-tests.log
          npm run scorecard:migration --workspace=@a5c-ai/transport-mux 2>&1 | tee artifacts/mux-logs/transport-mux-scorecard.log

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/mux-logs/agent-mux-webui-playwright-install.log

      - name: agent-mux webui browser e2e
        run: |
          set -euo pipefail
          npm run test:e2e --workspace=@a5c-ai/agent-mux-webui 2>&1 | tee artifacts/mux-logs/agent-mux-webui-browser-e2e.log

      - name: Upload mux Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-mux-playwright-artifacts
          path: |
            packages/agent-mux/webui/.tmp/playwright-report
            packages/agent-mux/webui/.tmp/playwright-test-results
          if-no-files-found: warn

      - name: Upload mux validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-mux-logs
          path: artifacts/mux-logs
          if-no-files-found: warn

  validate_cloud:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Cloud Workspace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/cloud-logs

      - name: Validate cloud deployment workspace
        run: |
          set -euo pipefail
          npm run build:cloud 2>&1 | tee artifacts/cloud-logs/cloud-build.log
          npm run test:cloud 2>&1 | tee artifacts/cloud-logs/cloud-tests.log
          npm run coverage:cloud 2>&1 | tee artifacts/cloud-logs/cloud-coverage.log
          npm run verify:cloud-release 2>&1 | tee artifacts/cloud-logs/cloud-release.log

      - name: Upload cloud validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-cloud-logs
          path: artifacts/cloud-logs
          if-no-files-found: warn

  validate_observer_and_compiler:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Observer And Compiler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/observer-compiler-logs

      - name: Build compiler prerequisites
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-catalog 2>&1 | tee artifacts/observer-compiler-logs/agent-catalog-build.log

      - name: Build and test agent-plugins-mux
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-build.log
          npm run test --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee artifacts/observer-compiler-logs/agent-plugins-mux-tests.log

      - name: Build and test observer-dashboard
        run: |
          set -euo pipefail
          npm run build:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-build.log
          npm run test:observer 2>&1 | tee artifacts/observer-compiler-logs/observer-dashboard-tests.log

      - name: Upload observer and compiler logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-observer-compiler-logs
          path: artifacts/observer-compiler-logs
          if-no-files-found: warn

  validate_plugins:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Validate Plugin ${{ matrix.slug }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: babysitter-claude
            command: node packages/agent-plugins-mux/dist/cli.js diff --target claude-code --source plugins/babysitter-unified --existing plugins/babysitter
            log: babysitter-claude-diff.log
            needs_sdk: false
            needs_plugin_compiler: true
          - slug: babysitter-codex
            command: npm test --prefix plugins/babysitter-codex
            log: babysitter-codex-tests.log
            needs_sdk: true
          - slug: babysitter-github
            command: bash plugins/babysitter-github/test/plugin-validate.sh
            log: babysitter-github-validate.log
            needs_sdk: true
          - slug: babysitter-cursor
            command: bash plugins/babysitter-cursor/test/plugin-validate.sh
            log: babysitter-cursor-validate.log
            needs_sdk: true
          - slug: babysitter-gemini
            command: node plugins/babysitter-gemini/test/integration.test.js
            log: babysitter-gemini-integration.log
            needs_sdk: false
          - slug: babysitter-pi
            command: npm test --prefix plugins/babysitter-pi
            log: babysitter-pi-tests.log
            needs_sdk: false
          - slug: babysitter-omp
            command: npm test --prefix plugins/babysitter-omp
            log: babysitter-omp-tests.log
            needs_sdk: false
          - slug: babysitter-opencode
            command: npm test --prefix plugins/babysitter-opencode
            log: babysitter-opencode-tests.log
            needs_sdk: false
          - slug: babysitter-openclaw
            command: npm test --prefix plugins/babysitter-openclaw
            log: babysitter-openclaw-tests.log
            needs_sdk: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/plugin-logs

      - name: Build local SDK prerequisites
        if: ${{ matrix.needs_sdk }}
        run: |
          set -euo pipefail
          npm run build:sdk 2>&1 | tee "artifacts/plugin-logs/${{ matrix.slug }}-sdk-prereqs.log"

      - name: Build local plugin compiler prerequisites
        if: ${{ matrix.needs_plugin_compiler }}
        run: |
          set -euo pipefail
          npm run build --workspace=@a5c-ai/agent-catalog 2>&1 | tee "artifacts/plugin-logs/${{ matrix.slug }}-agent-catalog-build.log"
          npm run build --workspace=@a5c-ai/agent-plugins-mux 2>&1 | tee "artifacts/plugin-logs/${{ matrix.slug }}-agent-plugins-mux-build.log"

      - name: Run plugin validation
        run: |
          set -euo pipefail
          ${{ matrix.command }} 2>&1 | tee "artifacts/plugin-logs/${{ matrix.log }}"

      - name: Upload plugin validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-${{ matrix.slug }}-logs
          path: artifacts/plugin-logs
          if-no-files-found: warn

  generated_plugins:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Generate Plugin Snapshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/generated-plugin-logs

      - name: Generate plugin snapshots
        run: |
          set -euo pipefail
          npm run generate:plugins 2>&1 | tee artifacts/generated-plugin-logs/generated-plugins.log

      - name: Compare generated plugins with manual plugins
        id: compare_plugins
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/generate-plugins.mjs --output generated --compare . --compare-only 2>&1 | tee artifacts/generated-plugin-logs/generated-plugins-compare.log

      - name: Warn on manual plugin drift
        if: steps.compare_plugins.outcome == 'failure'
        run: echo "::warning::Generated plugins differ from the manually maintained plugin directories. Review staging-generated-plugin-logs for the drift report."

      - name: Upload generated plugin artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-generated-plugins
          path: generated
          if-no-files-found: warn

      - name: Upload generated plugin logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-generated-plugin-logs
          path: artifacts/generated-plugin-logs
          if-no-files-found: warn

      - name: Commit generated plugin snapshots
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/ plugins/babysitter-unified/plugin.json
          if git diff --cached --quiet; then
            echo "No generated plugin snapshot changes to commit."
          else
            git commit -m "chore: refresh generated plugin snapshots [skip staging]"
            if git push origin HEAD:$BRANCH_NAME 2>/dev/null; then
              echo "Generated plugin snapshots committed and pushed."
            elif git pull --rebase --autostash origin "$BRANCH_NAME" 2>/dev/null && git push origin HEAD:$BRANCH_NAME 2>/dev/null; then
              echo "Generated plugin snapshots committed after rebase."
            else
              echo "::warning::Could not push generated plugin snapshots due to a concurrent branch update."
              git rebase --abort 2>/dev/null || true
            fi
          fi

  prepare_staging_publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    name: Prepare Staging Publish
    needs:
      - validate_core
      - validate_mux
      - validate_cloud
      - validate_observer_and_compiler
      - validate_plugins
      - generated_plugins
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      staging_version_sdk: ${{ steps.version.outputs.staging_version_sdk }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set staging prerelease version
        id: version
        run: |
          set -euo pipefail
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          SHORT_SHA=$(git rev-parse --short HEAD)
          STAGING_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-staging.${SHORT_SHA}"
          echo "staging_version_unified=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_sdk=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_agent_mux=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_codex=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_github=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_cursor=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_gemini=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_pi=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_omp=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_opencode=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "staging_version_openclaw=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "Setting shared staging version: $STAGING_VERSION"
          export STAGING_VERSION
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const stagingVersion = process.env.STAGING_VERSION;
          const packageJsonPaths = new Set(['package.json']);
          const localPackageNames = new Set();
          const pluginManifestPaths = [
            'plugins/babysitter-unified/plugin.json',
            'plugins/babysitter/.claude-plugin/plugin.json',
            'plugins/babysitter/plugin.json',
            'plugins/babysitter-gemini/plugin.json',
            'plugins/babysitter-gemini/gemini-extension.json',
            'plugins/babysitter-github/plugin.json',
            'plugins/babysitter-cursor/plugin.json',
            'plugins/babysitter-opencode/plugin.json',
            'plugins/babysitter-openclaw/plugin.json',
            'plugins/babysitter-openclaw/openclaw.plugin.json',
          ];
          const versionsJsonPaths = [
            'plugins/babysitter/versions.json',
            'plugins/babysitter-codex/versions.json',
            'plugins/babysitter-gemini/versions.json',
            'plugins/babysitter-pi/versions.json',
            'plugins/babysitter-omp/versions.json',
            'plugins/babysitter-opencode/versions.json',
            'plugins/babysitter-openclaw/versions.json',
            'plugins/babysitter-github/versions.json',
            'plugins/babysitter-cursor/versions.json',
          ];
          const fields = ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies'];
          const skipDirs = new Set(['.git', '.a5c', 'node_modules', 'dist', 'build', 'coverage', 'artifacts', 'generated', 'examples']);

          function collectPackageJsons(dir) {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (!skipDirs.has(entry.name)) collectPackageJsons(fullPath);
                continue;
              }
              if (entry.isFile() && entry.name === 'package.json') {
                packageJsonPaths.add(fullPath);
              }
            }
          }

          for (const rootDir of ['packages', 'plugins']) {
            collectPackageJsons(rootDir);
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (String(pkg.name || '').startsWith('@a5c-ai/')) {
              localPackageNames.add(pkg.name);
            }
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            let changed = false;
            if (pkgPath === 'package.json' || localPackageNames.has(pkg.name)) {
              if (pkg.version !== stagingVersion) {
                pkg.version = stagingVersion;
                changed = true;
              }
            }
            for (const field of fields) {
              if (!pkg[field]) continue;
              for (const [depName, currentValue] of Object.entries(pkg[field])) {
                if (!localPackageNames.has(depName)) continue;
                if (currentValue !== stagingVersion) {
                  pkg[field][depName] = stagingVersion;
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
            }
          }

          for (const manifestPath of pluginManifestPaths) {
            if (!fs.existsSync(manifestPath)) continue;
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            manifest.version = stagingVersion;
            fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          }

          for (const versionsPath of versionsJsonPaths) {
            const versions = fs.existsSync(versionsPath) ? JSON.parse(fs.readFileSync(versionsPath, 'utf8')) : {};
            versions.sdkVersion = stagingVersion;
            if (versionsPath === 'plugins/babysitter-gemini/versions.json') {
              versions.extensionVersion = stagingVersion;
            }
            fs.writeFileSync(versionsPath, `${JSON.stringify(versions, null, 2)}\n`);
          }
          NODE

      - name: Commit sdkVersion to staging branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/babysitter/versions.json plugins/babysitter-codex/versions.json plugins/babysitter-gemini/versions.json plugins/babysitter-pi/versions.json plugins/babysitter-omp/versions.json plugins/babysitter-opencode/versions.json plugins/babysitter-openclaw/versions.json plugins/babysitter-github/versions.json plugins/babysitter-cursor/versions.json
          if git diff --cached --quiet; then
            echo "No sdkVersion changes to commit."
          else
            git commit -m "chore: set sdkVersion to ${{ steps.version.outputs.staging_version_sdk }} [skip staging]"
            if git push origin HEAD:staging 2>/dev/null; then
              echo "sdkVersion committed and pushed."
            elif git pull --rebase --autostash origin staging 2>/dev/null && git push origin HEAD:staging 2>/dev/null; then
              echo "sdkVersion committed after rebase."
            else
              echo "::warning::Could not push sdkVersion commit (concurrent run conflict). Skipping — npm publish already succeeded."
              git rebase --abort 2>/dev/null || true
            fi
          fi

      - name: Prepare workspace manifests for staging publish
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const stagingVersion = process.env.STAGING_VERSION;
          const packageJsonPaths = new Set(['package.json']);
          const localPackageNames = new Set();
          const pluginManifestPaths = [
            'plugins/babysitter-unified/plugin.json',
            'plugins/babysitter/.claude-plugin/plugin.json',
            'plugins/babysitter/plugin.json',
            'plugins/babysitter-gemini/plugin.json',
            'plugins/babysitter-gemini/gemini-extension.json',
            'plugins/babysitter-github/plugin.json',
            'plugins/babysitter-cursor/plugin.json',
            'plugins/babysitter-opencode/plugin.json',
            'plugins/babysitter-openclaw/plugin.json',
            'plugins/babysitter-openclaw/openclaw.plugin.json',
          ];
          const fields = ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies'];
          const skipDirs = new Set(['.git', '.a5c', 'node_modules', 'dist', 'build', 'coverage', 'artifacts', 'generated', 'examples']);

          function collectPackageJsons(dir) {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                if (!skipDirs.has(entry.name)) collectPackageJsons(fullPath);
                continue;
              }
              if (entry.isFile() && entry.name === 'package.json') {
                packageJsonPaths.add(fullPath);
              }
            }
          }

          for (const rootDir of ['packages', 'plugins']) {
            collectPackageJsons(rootDir);
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (String(pkg.name || '').startsWith('@a5c-ai/')) {
              localPackageNames.add(pkg.name);
            }
          }

          for (const pkgPath of packageJsonPaths) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            let changed = false;
            if (pkgPath === 'package.json' || localPackageNames.has(pkg.name)) {
              if (pkg.version !== stagingVersion) {
                pkg.version = stagingVersion;
                changed = true;
              }
            }
            for (const field of fields) {
              if (!pkg[field]) continue;
              for (const [depName, currentValue] of Object.entries(pkg[field])) {
                if (!localPackageNames.has(depName)) continue;
                if (currentValue !== stagingVersion) {
                  pkg[field][depName] = stagingVersion;
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
            }
          }

          for (const manifestPath of pluginManifestPaths) {
            if (!fs.existsSync(manifestPath)) continue;
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            manifest.version = stagingVersion;
            fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          }

          const geminiVersionsPath = 'plugins/babysitter-gemini/versions.json';
          const geminiVersions = JSON.parse(fs.readFileSync(geminiVersionsPath, 'utf8'));
          geminiVersions.extensionVersion = stagingVersion;
          fs.writeFileSync(geminiVersionsPath, `${JSON.stringify(geminiVersions, null, 2)}\n`);
          NODE
        env:
          STAGING_VERSION: ${{ steps.version.outputs.staging_version_sdk }}

      - name: Refresh staging publish lockfile
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --workspaces --include-workspace-root

      - name: Bundle staging publish workspace
        run: |
          set -euo pipefail
          mkdir -p artifacts/publish-source
          tar --exclude=.git --exclude=node_modules --exclude=artifacts -czf artifacts/publish-source/staging-publish-source.tgz .

      - name: Upload staging publish workspace
        uses: actions/upload-artifact@v4
        with:
          name: staging-publish-source
          path: artifacts/publish-source/staging-publish-source.tgz
          if-no-files-found: error

