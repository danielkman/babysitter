name: Live Stack

run-name: Live Stack for ${{ inputs.publish_ref }} @ ${{ inputs.publish_head_sha }}

on:
  workflow_dispatch:
    inputs:
      publish_run_id:
        description: Publish workflow run ID that produced build-all-dist
        required: true
        type: string
      publish_head_sha:
        description: Commit SHA to test
        required: true
        type: string
      publish_ref:
        description: Branch or ref that dispatched this live-stack run
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"
  NPM_CONFIG_PREFER_OFFLINE: "true"

concurrency:
  group: live-stack-${{ inputs.publish_run_id }}
  cancel-in-progress: false

jobs:
  live_stack_babysitter_plugin:
    name: Live Stack (babysitter-plugin, ${{ matrix.scenario.id }}, ${{ matrix.interaction_mode.id }}, os=ubuntu-latest-l)
    runs-on: ubuntu-latest-l
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        interaction_mode:
          - id: non-interactive
            interactive: 'false'
          - id: interactive
            interactive: 'true'
        install_mode:
          - id: babysitter-plugin
            required_trace_ids: agentMuxRunId,agentMuxSessionId,transportTraceId
            expected_artifacts: agent-mux-events,plugin-command-transcript,transport-mux-trace,provider-trace-redacted
        scenario:
          - id: live.agent-mux.claude-code.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.claude-code.google.gemini-3.1-pro
            agent_path: agent-mux
            agent: claude-code
            amux_agent: claude
            integration_type: third-party-plugin
            provider: google
            amux_provider: google
            model: gemini-3.1-pro-preview
            required_env: GOOGLE_API_KEY
          - id: live.agent-mux.codex.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: codex
            amux_agent: codex
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
          - id: live.agent-mux.pi.foundry-openai.gpt-5.5
            agent_path: agent-mux
            agent: pi
            amux_agent: pi
            integration_type: third-party-plugin
            provider: foundry-openai
            amux_provider: foundry
            model: gpt-5.5
            required_env: AZURE_API_KEY,AMUX_API_BASE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.publish_head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: |
          npm ci
          npm install --no-save --ignore-scripts @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-all-dist
          path: /tmp
          run-id: ${{ inputs.publish_run_id }}
          github-token: ${{ github.token }}

      - name: Extract build artifacts
        run: tar xzf /tmp/build-all-dist.tar.gz

      - name: Install node-pty for TTY-based tool use
        run: npm install node-pty --no-save

      - name: Link workspace CLIs to PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          for pair in \
            "amux:packages/agent-mux/cli/dist/index.js" \
            "babysitter-agent:packages/babysitter-agent/dist/cli/main.js" \
            "babysitter:packages/sdk/dist/cli/main.js"
          do
            name="${pair%%:*}"
            script="${pair#*:}"
            printf '#!/bin/sh\nexec node "%s/%s" "$@"\n' "${{ github.workspace }}" "$script" > "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run selected live stack E2E
        timeout-minutes: 30
        env:
          LIVE_STACK_SCENARIO_ID: ${{ matrix.scenario.id }}
          LIVE_STACK_AGENT_PATH: ${{ matrix.scenario.agent_path }}
          LIVE_STACK_AGENT: ${{ matrix.scenario.agent }}
          LIVE_STACK_AMUX_AGENT: ${{ matrix.scenario.amux_agent }}
          LIVE_STACK_INTEGRATION_TYPE: ${{ matrix.scenario.integration_type }}
          LIVE_STACK_BABYSITTER_HARNESS: ${{ matrix.scenario.babysitter_harness }}
          LIVE_STACK_INSTALL_MODE: ${{ matrix.install_mode.id }}
          LIVE_STACK_INTERACTION_MODE: ${{ matrix.interaction_mode.id }}
          LIVE_STACK_INTERACTIVE: ${{ matrix.interaction_mode.interactive }}
          LIVE_STACK_USE_AMUX_RUN: 'false'
          LIVE_STACK_PROVIDER: ${{ matrix.scenario.provider }}
          LIVE_STACK_AMUX_PROVIDER: ${{ matrix.scenario.amux_provider }}
          LIVE_STACK_MODEL: ${{ matrix.scenario.model }}
          LIVE_STACK_CREDENTIAL_MODE: github-org-secrets-and-vars
          LIVE_STACK_REQUIRED_ENV: ${{ matrix.scenario.required_env }}
          LIVE_STACK_LAYERS: ${{ matrix.install_mode.id }}
          LIVE_STACK_COVERAGE_LAYERS: ${{ matrix.scenario.provider }},${{ matrix.scenario.agent }}
          LIVE_STACK_REQUIRED_TRACE_IDS: ${{ matrix.install_mode.required_trace_ids }}
          LIVE_STACK_EXPECTED_ARTIFACTS: ${{ matrix.install_mode.expected_artifacts }}
          LIVE_STACK_RUN_MODEL_TESTS: '1'
          LIVE_STACK_REQUIRE_EVIDENCE: '1'
          LIVE_STACK_TEST_TIMEOUT_MS: '1800000'
          LIVE_STACK_COMMAND_TIMEOUT_MS: '1500000'
          LIVE_STACK_BABYSITTER_BIN: ${{ github.workspace }}/packages/sdk/dist/cli/main.js
          LIVE_STACK_AMUX_BIN: ${{ github.workspace }}/packages/agent-mux/cli/dist/index.js
          LIVE_STACK_BABYSITTER_AGENT_BIN: ${{ github.workspace }}/packages/babysitter-agent/dist/cli/main.js
          AZURE_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AMUX_API_BASE: https://${{ vars.AZURE_OPENAI_PROJECT_NAME }}.services.ai.azure.com
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_LOCATION: global
          GOOGLE_GENAI_USE_VERTEXAI: True
        run: |
          npm run test:e2e:live-stack:pipeline
          npm run coverage:e2e:live-stack

      - name: Upload live stack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-stack-${{ inputs.publish_run_id }}-${{ matrix.install_mode.id }}-${{ matrix.interaction_mode.id }}-${{ matrix.scenario.id }}
          path: artifacts/live-stack
          if-no-files-found: error

