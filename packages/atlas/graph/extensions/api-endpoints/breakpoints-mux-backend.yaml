# HTTP endpoints exposed by the breakpoints-mux MCP HTTP
# transport (`packages/breakpoints-mux/src/mcp/http-transport.ts`). The
# package's `backends/server.ts` ServerBreakpointBackend is a CLIENT of an
# external breakpoints-pro server and is therefore NOT modeled as an
# ApiEndpoint here (the upstream server's surface lives outside the
# monorepo). Only the in-process MCP HTTP server is exposed.
# Wired via @a5c-ai/breakpoints-mux PackageSurface `exposes_endpoint` edge.
nodeKind: APIEndpoint
id: api-endpoint:breakpoints-mux-mcp-streamable
attributes:
  displayName: "POST/GET/DELETE /mcp"
  method: POST
  path: "/mcp"
  responseShape: "MCP Streamable HTTP transport (SSE chunks for GET; JSON-RPC envelopes for POST)"
  authRequired: true
  description: "MCP Streamable HTTP transport endpoint multiplexing the breakpoints-mux MCP tool catalog (ask, list, answer, claim, status, list-responders, verify, poll). Bearer-token auth when BPX_MCP_TOKEN is configured. Source: packages/breakpoints-mux/src/mcp/http-transport.ts:9-160."
edges:
  exposed_by:
    - target: package:a5c-ai-breakpoints-mux
---
nodeKind: APIEndpoint
id: api-endpoint:breakpoints-mux-mcp-healthz
attributes:
  displayName: "GET /healthz"
  method: GET
  path: "/healthz"
  responseShape: "{ ok: bool }"
  authRequired: false
  description: "Liveness probe for the breakpoints-mux MCP HTTP server. Source: packages/breakpoints-mux/src/mcp/http-transport.ts:10."
edges:
  exposed_by:
    - target: package:a5c-ai-breakpoints-mux
