    marketplacePathRelative: ".agents/plugins/marketplace.json"
  packageMetadata:
    moduleType: commonjs
    binScriptExt: ".js"
    installLifecycle: none
    activationMessage: codex-open-plugins
    emitCjsWrappers: false
  componentSupport:
    agents: unsupported
    context: unsupported
edges:
  hosted_by:
    - target: agent:codex
