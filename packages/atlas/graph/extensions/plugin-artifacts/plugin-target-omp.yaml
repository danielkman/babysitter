nodeKind: PluginTarget
id: plugin-target:omp
attributes:
  displayName: "Oh-My-Pi"
  hostAgent: agent:omp
  adapterFamily: programmatic
  adapterName: omp
  manifestFormat: "state-only"
  commandFormat: markdown-commands
  skillHandling: derived-from-commands
  hookRegistrationFormat: null
  hookRegistrationOutputPath: null
  hookRegistrationAliasPaths: []
  harnessManifestPath: null
  marketplacePath: null
  pluginRootEnvVarForExtension: OMP_PLUGIN_ROOT
  scriptVariants:
    - javascript
  distribution:
    - npm-cli
  distributionModel: workspace-generated
  npmPublishable: true
  packageMetadata:
    moduleType: module
    binScriptExt: ".cjs"
    installLifecycle: none
    activationMessage: restart
    peerDependencyPackage: "@oh-my-pi/pi-coding-agent"
    emitCjsWrappers: false
  componentSupport:
    agents: native
    context: native
  cliCommand: "pi"
  callerEnvVars:
    - "OMP_SESSION_ID"
  configPaths:
    - ".omp"
  processNames:
    - "omp"
    - "oh-my-pi"
  capabilities:
    - SessionBinding
    - StopHook
    - Programmatic
edges:
  hosted_by:
    - target: agent:omp
