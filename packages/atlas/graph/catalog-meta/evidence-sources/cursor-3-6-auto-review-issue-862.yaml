  notes: |
    Official Cursor changelog entry 3.6, dated 2026-05-29, documents
    Auto-review Run Mode. Auto-review applies to Shell, MCP, and Fetch tool
    calls. Allowlisted calls run immediately, sandboxable calls run in the
    sandbox, and other agent actions route to a classifier subagent that can
    allow the call, try a different approach, or ask for approval. Cursor
    documents the settings path as Settings > Cursor Settings > Agents > Run
    Mode and notes that the classifier agent can be steered with custom
    instructions.
