---
nodeKind: CiSurface
id: ci:a5c-ai-kradle
attributes:
  ciId: "@a5c-ai/kradle"
  packageId: package:a5c-ai-kradle
  scripts:
    - build
    - test
    - validate:docs
    - package:check
    - smoke
    - check
  publishStrategy: npm-public
  releaseChannels:
    - staging
    - npm
  validationCommands:
    - "npm run check --workspace=@a5c-ai/kradle"
    - "npm run package:check --workspace=@a5c-ai/kradle"
  artifactExpectations:
    - "packages/kradle/core/dist/**"
    - "packages/kradle/core/bin/kradle-demo.mjs"
    - "packages/kradle/core/bin/kradle-server.mjs"
  triggerEvents:
    - push
    - pr
    - tag
edges:
  validates_package:
    - target: package:a5c-ai-kradle
