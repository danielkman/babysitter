nodeKind: InstallMethod
id: install:npm
attributes:
  displayName: "npm (global)"
  kind: npm
  platforms:
    - darwin
    - linux
    - win32
  command: "npm install -g {{package}}"
  prerequisiteCheck: "node --version"
edges:
  installs:
    - agent-version:claude-code@1.x
    - agent-version:codex@1.x
    - agent-version:cursor@current
