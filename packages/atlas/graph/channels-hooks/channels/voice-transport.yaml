nodeKind: Channel
id: channel:webrtc-voice
attributes:
  displayName: "WebRTC Voice"
  kind: voice
  endpoint: webrtc
  persistent: true
  description: |
    Realtime bidirectional audio transport for browser/app voice agents over
    WebRTC, terminated by the external media server (LiveKit). Carries the audio
    hot path (VAD->STT->LLM->TTS); governed tool workflows run out-of-band via
    @a5c-ai/voice-adapter. See docs/research/realtime-voice-agent-stack.md.
edges:
  realizes:
    - target: layer:3-transport
---
nodeKind: Channel
id: channel:sip-telephony
attributes:
  displayName: "SIP / PSTN Telephony"
  kind: voice
  endpoint: sip
  persistent: true
  description: |
    Realtime phone transport (SIP/PSTN, inbound + outbound, DTMF, REFER, warm/cold
    transfer) bridged to WebRTC by the external SIP gateway (livekit/sip). Inbound
    calls map onto the channels-adapter event->bounded-session-spawn pattern. See
    docs/research/realtime-voice-agent-stack.md.
edges:
  realizes:
    - target: layer:3-transport
---
nodeKind: Channel
id: channel:avatar-video-track
attributes:
  displayName: "Avatar Video Track"
  kind: video
  endpoint: webrtc
  persistent: true
  description: |
    The agent's published VIDEO track: a composited HTML <canvas> (avatar WebGL +
    annotation overlay + screen-share layer) captured via canvas.captureStream() and
    published into the Jitsi meeting through lib-jitsi-meet setEffect (the
    JitsiStreamPresenterEffect pattern), from the kradle headless-Chromium sidecar.
    See docs/research/realtime-voice-agent-stack.md §II.2.
edges:
  realizes:
    - target: layer:3-transport
---
nodeKind: Channel
id: channel:screenshare-vnc
attributes:
  displayName: "Screen-share / VNC surface"
  kind: video
  endpoint: vnc-websocket
  persistent: true
  description: |
    A remote desktop surfaced via noVNC (RFB over WebSocket / websockify), rendered
    to a canvas and composited into the agent's video track; the agent can both show
    and operate it. Governed start/stop. See docs/research/realtime-agent-gaps.md G7.
edges:
  realizes:
    - target: layer:3-transport
