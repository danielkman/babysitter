nodeKind: Experiment
id: experiment:edge-validity-regression
attributes:
  displayName: "Edge Validity Regression"
  description: |
    Experiment validating that edge validity stays at 100% — all edges in
    index.json reference nodes that exist in the records map. An edge
    referencing a non-existent node would indicate a broken reference
    introduced by renaming, deleting, or misspelling a node ID.
  status: completed
  result: validated
  startedAt: "2026-05-08"
  completedAt: "2026-05-10"
  evidence: |
    Edge validity verified: all source and target IDs in the edges array
    resolve to records in index.json. The indexer emits no unresolved-ref
    warnings. Build completed with stats.parseErrors = 0 and all edge
    references resolvable. Exit code: 0 (passing).
edges:
  tests_claim:
    - claim:edge-weights-in-index
