# ============================================================================
# Krate Components — Three-Plane Architecture
# Models Krate's internal components as StackPart nodes, Presentation
# surfaces, domain-specific Responsibilities, and testable graph claims.
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Control Plane Components
# ---------------------------------------------------------------------------
---
nodeKind: StackPart
id: stack-part:krate-control-plane
attributes:
  displayName: "Krate Control Plane"
  category: infrastructure
  description: |
    The Kubernetes API extension that makes Krate a K8s-native forge.
    Stores low-cardinality configuration as etcd-backed CRDs (Repository,
    WebhookSubscription, RefPolicy, BranchProtection, View, Selector)
    and enforces all mutations through Kubernetes RBAC and admission
    webhooks. Exposes watch/event streams so controllers and the UI
    can reconcile state changes in real time.
edges:
  realizes:
    - target: layer:6-agent-platform
      notes: "Core control plane for the Krate forge runtime"
  part_of:
    - target: agent:krate
      notes: "Krate control plane component"
---
nodeKind: StackPart
id: stack-part:krate-aggregated-api
attributes:
  displayName: "Krate Aggregated API Server"
  category: api
  description: |
    Postgres-backed Kubernetes API extension that serves high-cardinality
    social and execution data — PullRequest, Issue, Review, Pipeline, Job,
    WebhookDelivery, and all agent runtime resources. Registers with
    kube-apiserver via APIService so kubectl, client-go, watch, RBAC, and
    admission work transparently while avoiding etcd storage for records
    that grow with usage.
edges:
  realizes:
    - target: layer:6-agent-platform
      notes: "Aggregated API server for data-plane resources"
  part_of:
    - target: agent:krate
      notes: "Krate aggregated API component"
  implemented_by:
    - target: stack-part:managed-postgres
      notes: "PostgreSQL backs the aggregated API storage"
---
nodeKind: StackPart
id: stack-part:krate-identity-engine
attributes:
  displayName: "Krate Identity Engine"
  category: security
  description: |
    Handles OIDC/OAuth sign-in, maps external identities to Kubernetes
    users and groups via IdentityMapping CRDs, and evaluates Kubernetes
    RBAC policy for every API call. Issues scoped ServiceAccount tokens
    for CI jobs and agent dispatch attempts. Manages User, Team, Invite,
    AuthProvider, AgentServiceAccount, and AgentRoleBinding resources
    to ensure the forge never creates a parallel permission system.
edges:
  realizes:
    - target: layer:6-agent-platform
      notes: "Identity and RBAC enforcement layer"
  part_of:
    - target: agent:krate
      notes: "Krate identity engine component"

# ---------------------------------------------------------------------------
# 2. Data Plane Components
# ---------------------------------------------------------------------------
---
nodeKind: StackPart
id: stack-part:krate-git-backend
attributes:
  displayName: "Krate Git Backend (Gitea)"
  category: data-store
  description: |
    Gitea-backed Git server hosted on Kubernetes that terminates
    smart-HTTP and SSH Git traffic. Provides repository storage on
    RWX persistent volumes, SSH deploy keys, collaborator/team
    permissions, protected branches, and webhook firing. The control
    plane reconciles Repository CRDs into Gitea hosting state while
    keeping the Git protocol path outside the API controller boundary.
edges:
  realizes:
    - target: layer:8-execution
      notes: "Git data plane execution layer"
  part_of:
    - target: agent:krate
      notes: "Krate Git backend component"
  implemented_by:
    - target: tool:gitea
      notes: "Gitea is the backing Git server"
---
nodeKind: StackPart
id: stack-part:krate-object-store
attributes:
  displayName: "Krate Object Store"
  category: data-store
  description: |
    Storage layer for LFS blobs, release archives, CI artifacts, and
    other large immutable objects. Backed by S3-compatible object storage
    and separated from the Git ref/pack storage so that binary-heavy
    repositories do not saturate the Gitea persistent volume. Object
    placement is tracked per-repository in Repository status and resolved
    independently from Git backend routing.
edges:
  realizes:
    - target: layer:8-execution
      notes: "Object/artifact storage execution"
  part_of:
    - target: agent:krate
      notes: "Krate object store component"
---
nodeKind: StackPart
id: stack-part:krate-code-search
attributes:
  displayName: "Krate Code Search (Zoekt)"
  category: tooling
  description: |
    Zoekt-based trigram code search service that indexes all org-scoped
    repositories into per-cohort shards. Provides sub-second regex and
    literal search across the entire forge. Currently in the post-MVP
    roadmap — the indexer scales independently from Gitea backends and
    API servers so search traffic never starves Git read/write operations.
edges:
  realizes:
    - target: layer:8-execution
      notes: "Code search execution layer (post-MVP)"
  part_of:
    - target: agent:krate
      notes: "Krate code search component"
  implemented_by:
    - target: tool:zoekt
      notes: "Zoekt powers per-repo cohort indexing"
---
nodeKind: StackPart
id: stack-part:krate-ci-engine
attributes:
  displayName: "Krate CI Engine"
  category: compute
  description: |
    Pipeline and Job scheduling engine backed by ARC (Actions Runner
    Controller). Defines RunnerPool CRDs with warm/max replica scaling,
    trust-tier admission, per-pool cache backends, and queue-depth KEDA
    autoscaling. Pipelines execute as Kubernetes Jobs with projected
    ServiceAccount tokens scoped to repo/ref/pipeline. Collects artifacts,
    streams logs via SSE, and supports rerun-from-step semantics.
edges:
  realizes:
    - target: layer:8-execution
      notes: "CI pipeline execution engine"
  part_of:
    - target: agent:krate
      notes: "Krate CI engine component"

# ---------------------------------------------------------------------------
# 3. Agent Plane Components
# ---------------------------------------------------------------------------
---
nodeKind: StackPart
id: stack-part:krate-agent-dispatch
attributes:
  displayName: "Krate Agent Dispatch"
  category: compute
  description: |
    Handles manual and automated dispatch of AI coding agents. Creates
    AgentDispatchRun resources, performs permission review against org
    policies, assembles context bundles, and launches agent sessions as
    Kubernetes Jobs via the Agent Mux client. Tracks attempt lifecycle
    (Pending, PermissionReview, ContextBundle, Running, Completed/Failed)
    and streams session output back through SSE.
edges:
  realizes:
    - target: layer:5-agent-runtime
      notes: "Agent dispatch runtime component"
  part_of:
    - target: agent:krate
      notes: "Krate agent dispatch component"
---
nodeKind: StackPart
id: stack-part:krate-agent-triggers
attributes:
  displayName: "Krate Agent Triggers"
  category: compute
  description: |
    Event routing engine that connects CI failures, incoming webhooks,
    PR comments, issue label changes, cron schedules, and manual actions
    to agent stacks via AgentTriggerRule CRDs. Evaluates matched events
    against capability requirements, performs deduplication and rate
    limiting, and initiates dispatch runs. Each trigger firing is recorded
    as an AgentTriggerExecution for audit trail purposes.
edges:
  realizes:
    - target: layer:5-agent-runtime
      notes: "Event-driven agent trigger routing"
  part_of:
    - target: agent:krate
      notes: "Krate agent triggers component"
---
nodeKind: StackPart
id: stack-part:krate-agent-approvals
attributes:
  displayName: "Krate Agent Approvals"
  category: security
  description: |
    Human gate controller for agent actions that exceed autonomy policy.
    When an agent requests destructive operations, secret access, production
    writes, or large refactors, the approval controller routes the request
    to designated reviewers via configurable channels (Slack, email, in-
    platform UI). Supports timeout policies, escalation chains, and
    auto-approve rules for trusted agent stacks.
edges:
  realizes:
    - target: layer:5-agent-runtime
      notes: "Human-in-the-loop approval gates"
  part_of:
    - target: agent:krate
      notes: "Krate agent approvals component"
---
nodeKind: StackPart
id: stack-part:krate-agent-workspaces
attributes:
  displayName: "Krate Agent Workspaces"
  category: compute
  description: |
    Git worktree provisioning and lifecycle management for agent dispatch
    runs. Creates isolated workspaces with their own branches, working
    directories, and environment variables according to AgentWorkspacePolicy
    CRDs. Tracks workspace state (active, idle, stale, dirty, archived,
    missing) and provides lifecycle actions: pin, archive, cleanup,
    recover, rebase, and open-in-editor.
edges:
  realizes:
    - target: layer:7-workspace
      notes: "Agent workspace provisioning and lifecycle"
  part_of:
    - target: agent:krate
      notes: "Krate agent workspaces component"
---
nodeKind: StackPart
id: stack-part:krate-agent-context
attributes:
  displayName: "Krate Agent Context Assembly"
  category: tooling
  description: |
    Prompt assembly engine that constructs AgentContextBundle resources
    with full source provenance. Gathers repository files, CI logs,
    issue descriptions, memory snapshots, and context labels into an
    immutable bundle with content-addressed digest. Redacts secret values
    before snapshotting and supports retry with original context unless
    explicitly refreshed. Every prompt fragment has traceable provenance.
edges:
  realizes:
    - target: layer:5-agent-runtime
      notes: "Context assembly and prompt safety"
  part_of:
    - target: agent:krate
      notes: "Krate agent context assembly component"
---
nodeKind: StackPart
id: stack-part:krate-company-brain
attributes:
  displayName: "Krate Company Brain"
  category: data-store
  description: |
    Cross-run knowledge persistence layer implementing organizational
    memory. Manages AgentMemoryRepository, AgentMemorySnapshot,
    AgentMemoryQuery, AgentMemoryUpdate, AgentMemoryOntology, and
    AgentMemoryAssociation resources. Supports vector similarity search,
    temporal filtering, and org-scoped access control so agents accumulate
    knowledge across independent dispatch runs — coding patterns,
    architecture decisions, error resolutions, and team conventions.
edges:
  realizes:
    - target: layer:12-knowledge-fabric
      notes: "Company brain memory and knowledge layer"
  part_of:
    - target: agent:krate
      notes: "Krate company brain component"

# ---------------------------------------------------------------------------
# 4. Integration Components
# ---------------------------------------------------------------------------
---
nodeKind: StackPart
id: stack-part:krate-gitops-sync
attributes:
  displayName: "Krate GitOps Sync (ArgoCD)"
  category: tooling
  description: |
    ArgoCD Application reconciliation that manages GitOps-driven
    deployment of Krate itself and tenant workloads. Watches Git
    repositories for manifest changes, performs declarative sync/prune/
    self-heal, and reports drift. Krate's own deployment is managed
    through its own forge — the platform eats its own dog food with
    ArgoCD as the continuous deployment engine.
edges:
  realizes:
    - target: layer:8-execution
      notes: "GitOps continuous deployment"
  part_of:
    - target: agent:krate
      notes: "Krate GitOps sync component"
  implemented_by:
    - target: tool:argocd
      notes: "ArgoCD powers GitOps reconciliation"
---
nodeKind: StackPart
id: stack-part:krate-webhook-bus
attributes:
  displayName: "Krate Webhook Bus"
  category: messaging
  description: |
    Durable webhook delivery queue serving outbound integrations.
    WebhookSubscription CRDs define endpoints, event filters, signing
    secrets, and retry policies. Each delivery is tracked as a
    WebhookDelivery aggregated resource with signature, phase, response
    code, and replay metadata. Supports coalescing, deduplication, and
    dead-letter queuing for failed deliveries.
edges:
  realizes:
    - target: layer:8-execution
      notes: "Webhook event delivery execution"
  part_of:
    - target: agent:krate
      notes: "Krate webhook bus component"
---
nodeKind: StackPart
id: stack-part:krate-agent-mux-client
attributes:
  displayName: "Krate Agent Mux Client"
  category: api
  description: |
    Zero-dependency HTTP/SSE adapter connecting Krate's dispatch
    controller to the Agent Mux gateway. Handles session creation,
    transcript streaming, tool approval relay, and session lifecycle
    management without requiring external npm dependencies. Translates
    between Krate's Kubernetes-native resource model and Agent Mux's
    transport protocol.
edges:
  realizes:
    - target: layer:3-transport
      notes: "Agent Mux transport client"
  part_of:
    - target: agent:krate
      notes: "Krate Agent Mux client component"
  implemented_by:
    - target: agent:agent-mux
      notes: "Communicates with Agent Mux gateway"

# ---------------------------------------------------------------------------
# 5. Krate Presentation Surfaces
# ---------------------------------------------------------------------------
---
nodeKind: Presentation
id: presentation:krate-web-ui
attributes:
  displayName: "Krate Web UI"
  kind: web
  description: |
    Next.js 16 App Router web interface for Krate. Server Components
    fetch directly from the Kubernetes and aggregated API. Watch streams
    are converted to SSE through route handlers for real-time updates.
    Org-scoped navigation provides Code, Issues, Pull Requests, Runs,
    Hooks, Settings, Agents, and Memory surfaces. Monaco or CodeMirror
    powers diff and code views.
  renderingTechnology: nextjs-app-router
  themeSupport: light-dark
  accessibilitySupport: basic
  offlineMode: 'no'
  platforms: [web]
edges:
  bundled_with:
    - target: agent:krate
      notes: "Primary web interface for the Krate forge"
---
nodeKind: Presentation
id: presentation:krate-cli
attributes:
  displayName: "Krate CLI (kubectl)"
  kind: cli
  description: |
    kubectl-native CLI access to all Krate resources. Since every forge
    concept is a Kubernetes custom resource or aggregated API object,
    standard kubectl commands (get, apply, delete, watch, describe)
    work directly. No custom CLI binary is needed — kubectl IS the
    Krate CLI, with custom short names and printer columns for
    ergonomic output.
  renderingTechnology: kubectl
  themeSupport: none
  accessibilitySupport: basic
  offlineMode: 'no'
  platforms: [darwin, linux, win32]
edges:
  bundled_with:
    - target: agent:krate
      notes: "kubectl-native CLI for Krate resources"
---
nodeKind: Presentation
id: presentation:krate-api
attributes:
  displayName: "Krate REST API"
  kind: api
  description: |
    REST API served on port 3080 by the Krate API controller. Provides
    workflow-shaped endpoints for the web UI, SSE streaming for watch
    updates, Git smart-HTTP proxy to the Gitea backend, and convenience
    endpoints for operations that span multiple Kubernetes resources.
    Authentication via Kubernetes bearer tokens and service accounts.
  renderingTechnology: http-rest
  themeSupport: none
  accessibilitySupport: none
  offlineMode: 'no'
  platforms: [web]
edges:
  bundled_with:
    - target: agent:krate
      notes: "REST API surface for the Krate forge"

# ---------------------------------------------------------------------------
# 6. Krate-Specific Responsibilities
# ---------------------------------------------------------------------------
---
nodeKind: Responsibility
id: responsibility:repository-governance
attributes:
  displayName: "Repository Governance"
  description: |
    Establishing and enforcing branch protection rules, merge policies
    (squash, rebase, merge commit), required reviewers, status checks,
    RefPolicy enforcement on receive-pack, and CI gating requirements.
    Ensures code flowing into protected branches meets quality,
    security, and review standards defined at the org and repo level.
edges:
  applies_to:
    - domain:software-engineering
    - domain:devops
    - domain:platform-engineering
---
nodeKind: Responsibility
id: responsibility:agent-dispatch-safety
attributes:
  displayName: "Agent Dispatch Safety"
  description: |
    Reviewing agent permission requests before dispatch, auditing secret
    grants (AgentSecretGrant), enforcing tool profile restrictions
    (AgentToolProfile), managing approval gates for destructive or
    privileged operations, and ensuring untrusted agent runs cannot
    escalate to trusted runner pools or access production secrets.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:security
    - domain:software-engineering
---
nodeKind: Responsibility
id: responsibility:company-brain-curation
attributes:
  displayName: "Company Brain Curation"
  description: |
    Maintaining the quality and accuracy of organizational memory stored
    in AgentMemoryRepository. Includes reviewing agent-proposed memory
    updates, maintaining the memory ontology schema, managing snapshot
    retention and archival, resolving conflicting or stale knowledge
    entries, and ensuring memory retrieval quality supports productive
    agent sessions.
edges:
  applies_to:
    - domain:platform-engineering
    - domain:software-engineering
---
nodeKind: Responsibility
id: responsibility:forge-availability
attributes:
  displayName: "Forge Availability"
  description: |
    Ensuring Git service uptime for clone/push/fetch operations, API
    availability for the aggregated and CRD-backed resources, storage
    health for Gitea persistent volumes and object storage, and graceful
    degradation when Postgres or individual components are unavailable.
    Includes monitoring request latency, error rates, watch counts,
    and reconciliation lag.
edges:
  applies_to:
    - domain:devops
    - domain:platform-engineering

# ---------------------------------------------------------------------------
# 7. Testable Claims for Krate Graph Integrity
# ---------------------------------------------------------------------------
---
nodeKind: TestableClaim
id: claim:krate-has-49-resource-kinds
attributes:
  displayName: "Krate defines 49 resource kinds"
  description: |
    Verifies that the Krate product (agent:krate) description
    references 49 total resource kinds across etcd CRDs and aggregated
    API resources, confirming the resource model is fully represented.
  testStatus: untested
  testType: unit
  testCommand: "node -e \"const i=JSON.parse(require('fs').readFileSync('packages/atlas/src/index.json','utf8'));const r=i.records['agent:krate'];process.exit(r&&r.attributes&&String(r.attributes.description||'').includes('49')?0:1)\""
  category: graph-integrity
  priority: high
edges:
  asserts_about:
    - agent:krate
---
nodeKind: TestableClaim
id: claim:krate-integrates-with-agent-mux
attributes:
  displayName: "Krate integrates with Agent Mux"
  description: |
    Verifies that agent:krate has an integrates_with edge pointing
    to agent:agent-mux, confirming the agent dispatch integration
    path is modeled in the graph.
  testStatus: untested
  testType: unit
  testCommand: "node -e \"const i=JSON.parse(require('fs').readFileSync('packages/atlas/src/index.json','utf8'));process.exit(i.edges.some(e=>e.from==='agent:krate'&&e.kind==='integrates_with'&&e.to==='agent:agent-mux')?0:1)\""
  category: graph-integrity
  priority: high
edges:
