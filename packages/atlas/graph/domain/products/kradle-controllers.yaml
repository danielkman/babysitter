nodeKind: AgentGovernanceImpl
id: agent-governance-impl:kradle-policy-resources@current
attributes:
  displayName: Kradle Policy Resource Governance
  agentVersionId: agent-version:babysitter@current
  packageRef: source-ref:babysitter-sdk
  componentKind: policy-engine
  governedSurfaces:
    - PolicyProfile
    - PolicyTemplate
    - PolicyBinding
    - PolicyExceptionRequest
    - Kyverno admission reports
  riskControls:
    - admission-policy
    - policy-exception-review
    - agent-tool-governance
    - workspace-boundary-enforcement
  evidenceProduced:
    - Kradle status conditions
    - Kyverno policy reports
    - policy exception requests
  notes: Models Kradle policy CRDs as governance resources connected to Kyverno-backed admission and exception semantics.
edges:
  realizes:
    - layer:14-governance
  composes:
    - target: agent:babysitter
      role: governance
  depends_on:
    - tool:kyverno
  governs_resource:
    - target: kubernetes-crd-kind:kradle-policy-profile
      governanceMode: admission
    - target: kubernetes-crd-kind:kradle-policy-template
      governanceMode: admission
    - target: kubernetes-crd-kind:kradle-policy-binding
      governanceMode: admission
    - target: kubernetes-crd-kind:kradle-policy-exception-request
      governanceMode: admission
