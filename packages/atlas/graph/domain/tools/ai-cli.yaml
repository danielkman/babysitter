nodeKind: Tool
id: tool:ai-cli
attributes:
  displayName: "ai-cli"
  homepageUrl: "https://ai-cli.dev"
  kind: ai-dev-tool
  description: |
    Open source (Apache-2.0) by Vercel Labs — github.com/vercel-labs/ai-cli
    (npm `ai-cli`; self-described "agent-native"). Terminal CLI for generating text, images, and video from prompts, with
    multi-model comparison and pipeable I/O. Routes to models from OpenAI,
    Anthropic, Google, Black Forest Labs, and ByteDance through the Vercel AI
    Gateway; short names auto-resolve (e.g. `flux-2-pro`, `gpt-image-2`) and model
    discovery is live (no hardcoded list). Supports stdin/stdout piping for chaining
    (`ai image | ai video`), inline terminal image preview via graphics protocols,
    and JSON metadata output for automation. Install `npm install -g ai-cli`; usage
    `ai image "prompt"`, `ai video "prompt"`, `ai text "prompt"`, `ai models`.
    Designed for scripts, CI pipelines, agent toolchains, and terminal workflows.
