nodeKind: InteractionPrimitive
id: interaction-primitive:adapters-kanban-board
attributes:
  displayName: "Adapters Kanban board"
  description: |
    Kanban-style board view of issues / runs / sessions across an
    adapters workspace. Primary high-level navigation surface in the
    web and mobile clients.
  kind: editor-ui
  surface: editor-ui
  category: interaction-primitive-category:navigation
  availableInModes: [chat, plan]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:navigation
---
nodeKind: InteractionPrimitive
id: interaction-primitive:adapters-hook-inbox
attributes:
  displayName: "Adapters hook inbox"
  description: |
    Inbox of pending hook / breakpoint approvals across all sessions
    bridged through adapters. Each entry resolves via approve / reject
    against the upstream orchestrator (e.g. babysitter task:post).
  kind: editor-ui
  surface: editor-ui
  category: interaction-primitive-category:approval
  availableInModes: [chat, plan]
  requiresPermission: true
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:approval
---
nodeKind: InteractionPrimitive
id: interaction-primitive:adapters-session-list
attributes:
  displayName: "Adapters session list"
  description: |
    Browse the list of agent sessions (active, paused, archived) within
    a workspace. Filter by agent, status, and label.
  kind: editor-ui
  surface: editor-ui
  category: interaction-primitive-category:navigation
  availableInModes: [chat, plan, composer, edit]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:navigation
