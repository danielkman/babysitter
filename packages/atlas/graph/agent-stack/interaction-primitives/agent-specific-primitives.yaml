nodeKind: InteractionPrimitive
id: interaction-primitive:amp-oracle-dispatch
attributes:
  displayName: "Amp Oracle subagent dispatch"
  description: |
    Dispatch a query to Amp's Oracle subagent — Sourcegraph Amp's
    specialized deep-reasoning persona that runs longer for complex
    multi-step problems. Triggered via tool-call from the parent
    session; emits structured findings back to the parent on completion.
  kind: editor-ui
  surface: editor-ui
  category: interaction-primitive-category:human-in-loop
  availableInModes: [chat, plan]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:human-in-loop
---
nodeKind: InteractionPrimitive
