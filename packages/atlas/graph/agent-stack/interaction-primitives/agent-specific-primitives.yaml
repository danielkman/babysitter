nodeKind: InteractionPrimitive
id: interaction-primitive:droid-parallel-subagent-dispatch
attributes:
  displayName: "Factory Droid parallel-subagent dispatch"
  description: |
    Dispatch up to 10 parallel subagents from Factory Droid. Each
    subagent runs in its own ChildSession; results aggregated and
    returned to the parent session. Triggered via tool-call.
  kind: editor-ui
  surface: editor-ui
  category: interaction-primitive-category:lifecycle
  availableInModes: [chat, plan]
  requiresPermission: false
edges:
  realizes:
    - target: layer:10-interaction
  in_category:
    - interaction-primitive-category:lifecycle
