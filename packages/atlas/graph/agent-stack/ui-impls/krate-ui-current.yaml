nodeKind: AgentUIImpl
id: agent-ui-impl:krate.ui@current
attributes:
  displayName: "Krate UI (current) — Next.js 16 + React 19 web dashboard"
  agentVersionId: agent-version:krate@current
  description: |
    Krate's presentation layer: Next.js 16 App Router with React 19 server components,
    SSE watch streams for real-time resource updates, org-scoped navigation with team
    and project switching, agent dispatch console with live session streaming, pull
    request review UI, code search powered by Zoekt, and company brain memory browser.
  uiKind: web-dashboard
  themeSupport: light-dark
  accessibilitySupport: basic
  notes: |
    The Krate web UI is a Next.js 16 application served from within the Kubernetes
    cluster. It uses React 19 server components for initial render performance and
    SSE watch streams for real-time updates. All UI state (views, selectors, dashboard
    layouts) is persisted as Kubernetes CRDs, making UI personalization declarative
    and version-controllable.
edges:
  realizes:
    - target: layer:11-presentation
  composes:
    - target: agent:krate
      role: ui
  supports_interaction_primitive:
    - target: interaction-primitive:krate-agent-dispatch
      attributes:
        mechanism: web-ui-action
        invocationToken: "dispatch agent"
    - target: interaction-primitive:krate-agent-trigger-process
      attributes:
        mechanism: web-ui-config
        invocationToken: "configure trigger rule"
    - target: interaction-primitive:krate-agent-approval-decide
      attributes:
        mechanism: web-ui-action
        invocationToken: "approve/deny agent action"
    - target: interaction-primitive:krate-pr-create
      attributes:
        mechanism: web-ui-action
        invocationToken: "create pull request"
    - target: interaction-primitive:krate-pr-merge
      attributes:
        mechanism: web-ui-action
        invocationToken: "merge pull request"
    - target: interaction-primitive:krate-pr-review
      attributes:
        mechanism: web-ui-action
        invocationToken: "submit review"
    - target: interaction-primitive:krate-memory-query
      attributes:
        mechanism: web-ui-search
        invocationToken: "search company brain"
    - target: interaction-primitive:krate-memory-update
      attributes:
        mechanism: web-ui-action
        invocationToken: "update memory entity"
  integrates_with:
    - target: framework:nextjs
      notes: "App Router with server components for the web dashboard"
    - target: framework:react
      notes: "React 19 component library for the Krate UI"
    - target: tool:zoekt
      notes: "Code search integration in the web UI"
