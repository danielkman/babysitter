nodeKind: AgentUIImpl
id: agent-ui-impl:tula.ui@current
attributes:
  displayName: "tula UI (current) — CLI binary"
  agentVersionId: agent-version:tula@current
  packageRef: source-ref:packages-tula
  uiKind: cli-only
  presentationsBundled:
    - presentation:tula-cli
  themeSupport: none
  accessibilitySupport: basic
  notes: |
    tula's user-facing surface is its CLI binary (`tula`). The CLI wraps
    agent-platform and adapters surfaces. Operator UIs (TUI, web, mobile)
    are delivered via the adapters package family.
edges:
  realizes:
    - target: layer:11-presentation
  bundled_with:
    - target: presentation:tula-cli
  supports_interaction_primitive:
    - target: interaction-primitive:babysitter-run-create
      attributes:
        mechanism: native-api
        invocationToken: "tula run:create"
    - target: interaction-primitive:babysitter-run-iterate
      attributes:
        mechanism: native-api
        invocationToken: "tula run:iterate"
    - target: interaction-primitive:babysitter-task-post
      attributes:
        mechanism: native-api
        invocationToken: "tula task:post"
    - target: interaction-primitive:babysitter-doctor
      attributes:
        mechanism: native-api
        invocationToken: "tula doctor"
    - target: interaction-primitive:babysitter-mcp-server
      attributes:
        mechanism: native-api
        invocationToken: "tula mcp"
