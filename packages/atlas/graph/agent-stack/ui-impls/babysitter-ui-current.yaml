nodeKind: AgentUIImpl
id: agent-ui-impl:babysitter.ui@current
attributes:
  displayName: "babysitter UI (current) — agent-mux + babysitter-agent CLI"
  agentVersionId: agent-version:babysitter@current
  packageRef: source-ref:babysitter-github
  uiKind: multi-surface
  presentationsBundled:
    - presentation:agent-mux-tui
    - presentation:agent-mux-cli
    - presentation:agent-mux-webui
    - presentation:agent-mux-mobile-ios
    - presentation:agent-mux-mobile-android
    - presentation:agent-mux-tv-androidtv
    - presentation:agent-mux-tv-appletv
    - presentation:agent-mux-watch-watchos
    - presentation:agent-mux-watch-wearos
    - presentation:babysitter-agent-cli
  themeSupport: full-customizable
  accessibilitySupport: wcag-aa
  notes: |
    babysitter is a multi-surface suite. The user-facing UI is delivered by
    the agent-mux package family (TUI / web / mobile / TV / watch) and the
    babysitter-agent CLI binary. Programmatic consumers use the babysitter
    SDK directly (no UI). This AgentUIImpl aggregates all UI surfaces
    available to babysitter operators. The constituent products
    (`agent:babysitter-sdk`, `agent:babysitter-agent`, `agent:agent-mux`)
    are sibling AgentProducts that compose into the same babysitter
    umbrella narrative.
edges:
  realizes:
    - target: layer:11-presentation
  supports_interaction_primitive:
    - target: interaction-primitive:babysitter-call
      attributes:
        mechanism: slash-command
        invocationToken: "/babysitter:call"
