nodeKind: AgentUIImpl
id: agent-ui-impl:babysitter.ui@current
attributes:
  displayName: "babysitter UI (current) — adapters + agent-platform CLI"
  agentVersionId: agent-version:babysitter@current
  packageRef: source-ref:babysitter-github
  uiKind: multi-surface
  presentationsBundled:
    - presentation:adapters-tui
    - presentation:adapters-cli
    - presentation:adapters-webui
    - presentation:adapters-mobile-ios
    - presentation:adapters-mobile-android
    - presentation:adapters-tv-androidtv
    - presentation:adapters-tv-appletv
    - presentation:adapters-watch-watchos
    - presentation:adapters-watch-wearos
    - presentation:agent-platform-cli
  themeSupport: full-customizable
  accessibilitySupport: wcag-aa
  notes: |
    babysitter is a multi-surface suite. The user-facing UI is delivered by
    the adapters package family (TUI / web / mobile / TV / watch) and the
    agent-platform CLI binary. Programmatic consumers use the babysitter
    SDK directly (no UI). This AgentUIImpl aggregates all UI surfaces
    available to babysitter operators. The constituent products
    (`agent:babysitter-sdk`, `agent:agent-platform`, `agent:adapters`)
    are sibling AgentProducts that compose into the same babysitter
    umbrella narrative.
edges:
