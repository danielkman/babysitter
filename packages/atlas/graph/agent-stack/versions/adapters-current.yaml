nodeKind: AgentVersion
id: agent-version:adapters@current
attributes:
  agentProductId: agent:adapters
  versionRange: ">=0.4.9"
  releasedAt: "2025-01-01"
  cliCommand: "adapters"
  installMethods:
    - install:npm
  minSchemaVersion: "6.0.0"
edges:
  version_of:
    - agent:adapters
  composed_of:
    - target: agent-core-impl:adapters.core@current
      role: core
    - target: agent-runtime-impl:adapters.runtime@current
      role: runtime
    - target: agent-platform-impl:adapters.platform@current
      role: platform
    - target: agent-ui-impl:adapters.ui@current
      role: ui
  sourced_from: []
  supports:
    - target: capability:can-multi-turn
      versionRange: '>=0.4.9'
      level: full
      notes: adapters orchestrates multi-turn agent sessions across multiple harnesses.
    - target: capability:supports-text-streaming
      versionRange: '>=0.4.9'
      level: full
      notes: adapters streams text output from underlying agents.
    - target: capability:supports-mcp
      versionRange: '>=0.4.9'
      level: full
      notes: adapters integrates with MCP servers for tool dispatch.
    - target: capability:supports-subagent-dispatch
      versionRange: '>=0.4.9'
      level: full
      notes: adapters dispatches work to subagent harnesses.
  uses_memory_system:
    - target: memory-system:claude-code-auto-memory
    - target: memory-system:instruction-file-hierarchy
