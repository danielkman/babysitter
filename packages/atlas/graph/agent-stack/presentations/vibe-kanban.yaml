---
nodeKind: Presentation
id: presentation:vibe-kanban
attributes:
  displayName: "Vibe-Kanban"
  kind: web
  description: |
    Visual kanban board for orchestrating coding agents. Provides a
    browser-based task board UI where issues map to kanban columns
    (todo, in-progress, review, done), each card spawns an isolated
    workspace with dedicated git worktree, terminal, and dev server.
    Supports 10+ coding agents (Claude Code, Codex, Gemini CLI, etc.)
    with per-agent worktree isolation, inline code review gates at
    column transitions, and parallel agent dispatch for concurrent
    task execution.
  renderingTechnology: next-js
  themeSupport: light-dark
  accessibilitySupport: basic
  offlineMode: 'no'
  platforms: [web]
  bundleSize: "~5 MB"
  updateChannel: auto
edges:
  integrates_with:
    - target: topic:vibe-kanban
  lib_applies_to_domain:
