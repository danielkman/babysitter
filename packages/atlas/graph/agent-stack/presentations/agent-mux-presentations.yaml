---
nodeKind: Presentation
id: presentation:adapters-tui
attributes:
  displayName: "adapters TUI"
  kind: tui
  description: |
    Terminal UI for adapters sessions. Renders agent runs, slash commands,
    and breakpoint approvals in an ink-based full-screen terminal shell;
    bridges to remote agents (claude-code, codex, etc.) via the adapters
    transport.
  renderingTechnology: terminal-emulator
  themeSupport: light-dark
  accessibilitySupport: basic
  offlineMode: partial
  platforms: [darwin, linux, win32]
  bundleSize: "~50 MB"
  updateChannel: auto
edges: {}
---
nodeKind: Presentation
id: presentation:adapters-cli
attributes:
  displayName: "adapters CLI"
  kind: cli
  description: |
    Non-interactive CLI surface of adapters. Scriptable `adapters run --json`
    invocation that proxies events from the bridged remote agent and exits
    on session end. Used in CI and headless automation.
  themeSupport: none
  accessibilitySupport: basic
  offlineMode: partial
  platforms: [darwin, linux, win32]
  bundleSize: "~50 MB"
  updateChannel: auto
edges: {}
