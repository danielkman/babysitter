nodeKind: Presentation
id: presentation:adapters-webui
attributes:
  displayName: "adapters Web UI"
  kind: web
  description: |
    Browser-based control surface for adapters sessions. Next.js / React
    web app rendering a session list, run detail panel, kanban board, and
    real-time hook/breakpoint inbox driven by the adapters gateway.
  renderingTechnology: next-js
  themeSupport: full-customizable
  accessibilitySupport: wcag-aa
  offlineMode: partial
  platforms: [web]
  bundleSize: "~5 MB"
  updateChannel: auto
