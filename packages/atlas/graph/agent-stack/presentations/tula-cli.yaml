---
nodeKind: Presentation
id: presentation:tula-cli
attributes:
  displayName: "tula CLI"
  kind: cli
  description: |
    CLI entry point for the tula agent. Wraps agent-platform and adapters
    surfaces into a single `tula` binary. Supports both interactive and
    headless/CI modes; emits a normalized JSON event stream when invoked
    with `--json`.
  renderingTechnology: vte
  themeSupport: none
  accessibilitySupport: basic
  offlineMode: 'no'
  platforms: [darwin, linux, win32]
  updateChannel: npm
edges:
  bundled_with:
    - agent-platform-impl:tula.platform@current
