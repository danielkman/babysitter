nodeKind: KnowledgeFabricImpl
id: knowledge-fabric-impl:krate.knowledge@current
attributes:
  displayName: "Krate Knowledge Fabric — Company brain memory"
  agentVersionId: agent-version:krate@current
  description: |
    Krate's knowledge fabric: AgentMemoryRepository CRDs define org-scoped knowledge
    stores backed by vector databases. Memory snapshots capture structured knowledge
    from agent sessions — code patterns, architecture decisions, error resolutions,
    and team conventions. An ontology-driven knowledge graph organizes entities and
    associations for structured retrieval. Memory snapshots enable point-in-time
    rollback and cross-run memory import. Agents query the company brain at session
    start to retrieve relevant organizational context, reducing ramp-up time and
    improving consistency across independent dispatch runs.
  knowledgeFileFormats:
    - AgentMemorySnapshot (K8s aggregated API resource)
    - AgentMemoryRepository (K8s CRD)
    - AgentMemoryOntology (K8s CRD)
    - AgentMemoryAssociation (K8s CRD)
  knowledgeScopes:
    - organization
    - project
    - team
  autoExtractionSupport: true
  retrievalStrategy: vector-similarity-search
  knowledgePersistence: postgres-vector-store
  notes: |
    Unlike file-hierarchy knowledge systems, Krate's knowledge fabric uses vector
    embeddings for semantic similarity search. Memory entities are structured per
    the ontology schema and linked via typed associations. The knowledge fabric
    supports temporal filtering, org-scoped access control, and automated extraction
    from agent session transcripts. Cross-run memory import allows agents to inherit
    knowledge from previous sessions in the same project or organization.
edges:
  realizes:
    - target: layer:12-knowledge-fabric
  composes:
    - target: agent-version:krate@current
      role: knowledge-fabric
  uses_memory_system:
    - target: memory-system:file-based-markdown-pattern
  integrates_with:
    - target: topic:krate-agent-memory-repository
      notes: "Memory store configuration and access control"
    - target: topic:krate-agent-memory-ontology
      notes: "Knowledge graph schema for structured retrieval"
    - target: topic:krate-agent-memory-snapshot
      notes: "Point-in-time knowledge captures from agent sessions"
    - target: topic:krate-agent-memory-association
      notes: "Cross-entity relationships in the knowledge graph"
