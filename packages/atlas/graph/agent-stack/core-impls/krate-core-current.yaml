nodeKind: AgentCoreImpl
id: agent-core-impl:krate.core@current
attributes:
  displayName: "Krate Core (current) — K8s-native forge engine"
  agentVersionId: agent-version:krate@current
  description: |
    Krate's core engine: resource model with 49 K8s resource kinds (43 CRDs + 6 aggregated),
    org-scoped control plane with in-memory etcd + Postgres storage, RBAC/admission enforcement,
    and declarative resource lifecycle management. Zero external runtime dependencies.
  loopIteratorPolicy: controller-reconciliation
  loopIteratorNotes: |
    Krate does not use a chat-turn loop; instead, its core operates on a Kubernetes
    controller reconciliation pattern. CRD changes trigger reconcile handlers that
    drive the resource lifecycle forward — creating dispatch runs, assembling context,
    provisioning workspaces, and collecting results. The agent session itself is
    delegated to agent-mux which runs the coding agent's own tool-use loop.
  contextManagementStrategy: platform-managed
  subagentInvokerPolicy: dispatch-run
  subagentInvokerNotes: |
    Agent dispatch is managed through AgentDispatchRun resources. Each dispatch creates
    a Kubernetes Job running agent-mux with the selected agent stack. The dispatch
    controller monitors the job, streams output via SSE, and collects results on
    completion.
  resultSynthesisPolicy: aggregated-status
  resultSynthesisNotes: |
    Results are synthesized from multiple Kubernetes status conditions on the
    AgentDispatchRun resource — session outcome, artifacts produced, memory snapshots
    generated, and PR actions taken. The final status is a composite of all sub-statuses.
  stopDetectionStrategy: structured-end-event
  parallelToolCallHandling: delegated-to-agent
  streamingFidelity: sse
edges:
  realizes:
    - target: layer:4-agent-core
  composes:
    - target: agent:krate
      role: core
  supports:
    - target: capability:can-multi-turn
      versionRange: ">=0.1.0"
      level: full
      notes: |
        Agent sessions within dispatch runs maintain multi-turn state; the underlying
        coding agent (Claude Code, Codex, etc.) runs its own multi-turn loop.
    - target: capability:supports-subagent-dispatch
      versionRange: ">=0.1.0"
      level: full
      notes: |
        AgentDispatchRun resources dispatch coding agents as K8s Jobs via agent-mux.
        Multiple dispatch runs execute concurrently as separate Jobs.
    - target: capability:supports-parallel-execution
      versionRange: ">=0.1.0"
      level: full
      notes: |
        Multiple agent dispatch runs execute in parallel as independent Kubernetes Jobs,
        subject to org-level quota limits defined in AgentQuotaProfile.
    - target: capability:streaming
      versionRange: ">=0.1.0"
      level: full
      notes: |
        Real-time streaming of agent output and pipeline logs via Server-Sent Events (SSE).
