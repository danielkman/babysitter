nodeKind: AgentCoreImpl
id: agent-core-impl:adapters.core@current
attributes:
  displayName: "adapters Core (current) — bridge to remote agent loop"
  agentVersionId: agent-version:adapters@current
  packageRef: source-ref:adapters-github
  loopIteratorPolicy: delegated-to-remote
  loopIteratorNotes: |
    adapters does not host its own model loop. The adapters core proxies
    a normalized event stream from whichever bridged remote agent is
    selected (claude-code, codex, etc.) and projects it onto the
    multi-surface UI suite.
  contextManagementStrategy: delegated-to-remote
  compactionTriggerNotes: |
    Whatever the bridged remote agent does. adapters performs no local
    compaction.
  subagentInvokerPolicy: delegated-to-remote
  subagentInvokerNotes: |
    Subagent semantics are emitted by the bridged remote agent and
    proxied verbatim through adapters.
  resultSynthesisPolicy: delegated-to-remote
  resultSynthesisNotes: |
    Final responses are produced by the bridged remote agent and forwarded
    by adapters to the active surface (TUI/web/mobile/...).
  stopDetectionStrategy: delegated-to-remote
  transportClientLibrary: none
  supportedTransportProtocols: []
  parallelToolCallHandling: delegated-to-remote
  streamingFidelity: full
  thinkingChannelHandling: delegated-to-remote
  notes: |
    adapters is a multi-surface UI suite, not an agent loop. The core
    layer is a thin event projection / session-state cache feeding the
    bundled presentations.
edges:
  realizes:
    - target: layer:4-agent-core
  composes:
    - target: agent:adapters
      role: core
  speaks: []
  supports_orchestration_primitive:
    - target: orch-primitive:multi-agent-dispatch
    - target: orch-primitive:session-handoff
    - target: orch-primitive:progress-stream
    - target: orch-primitive:concurrency-control
    - target: orch-primitive:approval-gate
