nodeKind: AgentCoreImpl
id: agent-core-impl:tula.core@current
attributes:
  displayName: "tula Core (current) — composed tula-core + babysitter-sdk loop"
  agentVersionId: agent-version:tula@current
  packageRef: source-ref:packages-tula
  loopIteratorPolicy: process-function-driven
  loopIteratorNotes: |
    tula composes @a5c-ai/tula-core and @a5c-ai/babysitter-sdk; the loop
    semantics are inherited from babysitter-sdk (user-authored async
    `process(inputs, ctx)` with journaled effects) exposed through the
    tula-core contract.
  contextManagementStrategy: user-managed
  compactionTriggerNotes: |
    Inherited from the SDK; the wrapped process function owns context.
  subagentInvokerPolicy: platform-mediated
  subagentInvokerNotes: |
    Subagents dispatched via `ctx.task(...)` and spawned as harness
    subprocesses through the composed agent-platform layer.
  resultSynthesisPolicy: process-function-defined
  resultSynthesisNotes: |
    Final result is whatever the wrapped process function returns.
  stopDetectionStrategy: structured-end-event
  transportClientLibrary: none
  supportedTransportProtocols: []
  parallelToolCallHandling: delegated-to-remote
  streamingFidelity: full
  thinkingChannelHandling: delegated-to-remote
  notes: |
    tula's core layer composes tula-core and babysitter-sdk to provide the
    loop, context, and transport primitives. The binary adds CLI entrypoints,
    barrel exports, and agent-mux bridging on top.
edges:
  realizes:
    - target: layer:4-agent-core
  composes:
    - target: agent:tula
      role: core
  depends_on:
    - target: source-ref:packages-tula
    - target: source-ref:babysitter-sdk
  speaks: []
  supports_orchestration_primitive:
    - target: orch-primitive:workflow-policy-load
    - target: orch-primitive:task-create
    - target: orch-primitive:context-injection
