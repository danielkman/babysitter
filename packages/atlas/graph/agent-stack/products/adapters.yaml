nodeKind: AgentProduct
id: agent:adapters
attributes:
  displayName: "adapters"
  vendor: "a5c-ai"
  homepageUrl: "https://github.com/a5c-ai/babysitter/tree/main/packages/adapters"
  primarySurface: tui
  supportTier: catalog-backed
  productKind: multi-surface-suite
  stackScope: full
  description: |
    Multi-surface UI suite for agent sessions. Bridges to remote agents via
    the adapters transport (claude-code, codex, etc.) and presents the
    sessions through a TUI, CLI, web app, mobile apps (iOS + Android),
    TV apps, and watch apps. Includes the adapters gateway, core, adapters,
    and SDK as composing pieces. Distinct from `agent:adapters-remote`
    (which is the transport-only adapter).
edges:
  has_version:
    - agent-version:adapters@current
