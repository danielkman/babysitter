nodeKind: AgentPlatformImpl
id: agent-platform-impl:krate.platform@current
attributes:
  displayName: "Krate Platform (current) — Helm chart + CRD schema + K8s admission"
  agentVersionId: agent-version:krate@current
  description: |
    Krate's platform layer: Helm chart packaging and deployment, CRD schema definitions
    for all 43 etcd-backed resource kinds, Kubernetes namespace management for org-scoped
    tenancy, admission webhooks for policy enforcement via Kyverno, and the agent stack
    registry for managing available coding agent configurations.
  nativeExtensionFormat: k8s-crd
  subagentDefinitionFormat: agent-stack-crd
  skillFormat: krate-agent-skill-crd
  settingsFiles:
    - "values.yaml (Helm)"
    - "Organization CRD (per-org settings)"
    - "OrganizationSettings CRD"
  marketplaceUrl: "n/a — agent stacks managed via CRDs"
  capabilityProfileRegistry: true
  launchConfigRegistry: true
  platformIdentityStrategy: k8s-service-account
  updateChannelMechanism: helm-upgrade
edges:
  realizes:
    - target: layer:6-agent-platform
  composes:
    - target: agent:krate
      role: platform
  supports:
    - target: capability:supports-plugins
      versionRange: ">=0.1.0"
      level: partial
      notes: |
        Krate supports extending the platform via custom CRDs, webhook endpoints,
        and agent stack definitions. A formal plugin marketplace is planned.
    - target: capability:supports-subagent-dispatch
      versionRange: ">=0.1.0"
      level: full
      notes: |
        Agent stacks are defined as CRDs and managed through the platform's agent
        stack registry. New agent configurations are deployed via kubectl or Helm.
  integrates_with:
    - target: tool:helm
      notes: "Packaging and templating for Krate deployment and upgrades"
    - target: tool:kyverno
      notes: "Policy enforcement via admission webhooks and background scanning"
    - target: tool:kubernetes
      notes: "CRD schema registration, namespace management, and admission control"
