nodeKind: AgentVersion
id: agent-version:codex@0.136.0
attributes:
  agentId: "codex"
  agentProductId: agent:codex
  displayName: "Codex CLI 0.136.0"
  runtimeFamily: "cli-harness"
  releaseChannel: "stable"
  versionRange: "0.136.0"
  currentVersion: "0.136.0"
  releasedAt: "2026-06-01"
  sourcePackage: "@openai/codex"
  upstreamReleaseTag: "rust-v0.136.0"
  releaseNotesUrl: "https://github.com/openai/codex/releases/tag/rust-v0.136.0"
  cliCommand: "codex"
  summary: "Codex CLI release adding OSC 8 markdown links, session archive commands, app-server stdio/resume/status updates, API-key remote registration, server-token remote control, Windows sandbox provisioning, and safety hardening."
  assimilationNotes:
    - "Issue #859 tracks npm latest moving from 0.135.0 to 0.136.0."
    - "TUI markdown keeps web links clickable with OSC 8 metadata, and cramped tables render as key/value records without losing link targets."
    - "Sessions can be archived through /archive or codex archive / codex unarchive; archived sessions are protected from resume/fork until restored."
    - "App-server integrations can resume a thread with its initial turns page, expose richer MCP server status, and launch stdio mode with codex app-server --stdio."
    - "Remote execution setup supports CODEX_API_KEY registration for approved OpenAI hosts, while remote-control websockets use short-lived server tokens instead of ChatGPT access tokens."
    - "Windows admins get alpha codex sandbox setup --elevated plus requirements support for allowed Windows sandbox implementations."
    - "A feature-gated standalone image generation extension routes through the native Codex image artifact completion pipeline."
    - "Command-safety fixes cover /diff Git helper/hook execution, PowerShell parser execution off Windows, browser-origin exec-server websocket handshakes, sandbox cleanup, and deny-read enforcement."
    - "Python SDK docs/package metadata now present pip install openai-codex and use CodexConfig for Codex / AsyncCodex configuration."
  releaseHighlights:
    - "OSC 8 web links and key/value fallback rendering for cramped markdown tables."
    - "Session archive/unarchive lifecycle that blocks resume/fork until restore."
    - "codex app-server --stdio, richer MCP status, and initial turns on thread resume."
    - "Remote CODEX_API_KEY registration and short-lived server tokens for remote-control websockets."
    - "Alpha elevated Windows sandbox provisioning."
    - "Feature-gated image generation extension path."
  installMethods:
    - install:npm
  adapterMetadata:
    issue859ReleaseAdditions:
      releaseVersion: "0.136.0"
      sessionLifecycle:
        archiveCommands:
          - "/archive"
          - "codex archive"
          - "codex unarchive"
        archivedSessionResume: "blocked-until-restored"
        archivedSessionFork: "blocked-until-restored"
      appServer:
        stdioCommand: "codex app-server --stdio"
        threadResumeIncludesInitialTurnsPage: true
        richerMcpServerStatus: true
      remoteControl:
        apiKeyRegistrationEnv: "CODEX_API_KEY"
        websocketAuth: "short-lived-server-token"
        previousWebsocketAuth: "ChatGPT access token"
      terminalRendering:
        osc8WebLinks: true
        crampedMarkdownTables: "key-value-records"
      sandbox:
        windowsElevatedSetupCommand: "codex sandbox setup --elevated"
        windowsRequirementsSupport: true
      safety:
        rejectsBrowserOriginExecServerWebsockets: true
        avoidsRepoConfiguredDiffExecution: true
        preservesDenyReadForSafeCommands: true
edges:
  version_of:
    - agent:codex
  sourced_from:
    - evidence:codex-rust-v0-136-0-issue-859-release
