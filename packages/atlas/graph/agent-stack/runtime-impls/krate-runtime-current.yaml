nodeKind: AgentRuntimeImpl
id: agent-runtime-impl:krate.runtime@current
attributes:
  displayName: "Krate Runtime (current) — Node.js API + K8s controller"
  agentVersionId: agent-version:krate@current
  description: |
    Krate's runtime layer: Node.js HTTP server serving the aggregated API and REST
    convenience endpoints, Kubernetes controller-runtime reconcilers for CRD lifecycle,
    Gitea backend integration for Git hosting, ArgoCD GitOps sync for deployment,
    webhook bus for event routing, and runner scheduler for agent dispatch Jobs.
  subagentDispatchMechanism: k8s-job
  subagentChildSessionPolicy: isolated-container
  subagentToolScopePolicy: agent-permission-set
  toolRegistryDiscovery: crd-based
  approvalGatingPrimitive: agent-approval-resource
  subprocessSandboxStrategy: k8s-namespace-isolation
  supportedMCPTransports:
    - mcp-transport:stdio
    - mcp-transport:streamable-http
  supportsStreaming: true
edges:
  realizes:
    - target: layer:5-agent-runtime
  composes:
    - target: agent:krate
      role: runtime
  supports:
    - target: capability:supports-mcp
      versionRange: ">=0.1.0"
      level: full
      notes: |
        Krate agents can bind MCP servers via AgentMCPServer CRDs. Supports stdio and
        streamable-HTTP transports with health checking and reconnection.
    - target: capability:supports-subagent-dispatch
      versionRange: ">=0.1.0"
      level: full
      notes: |
        The runtime dispatches agents as Kubernetes Jobs via agent-mux. The runner
        scheduler manages concurrency, queuing, and resource allocation.
    - target: capability:streaming
      versionRange: ">=0.1.0"
      level: full
      notes: |
        Agent session output streams to the web UI via SSE endpoints served by the
        Node.js HTTP server.
  integrates_with:
    - target: tool:gitea
      notes: "Git hosting backend — repository storage, branch operations, and Git protocol"
    - target: tool:argocd
      notes: "GitOps continuous deployment for Krate components and tenant workloads"
    - target: tool:kubernetes
      notes: "Core runtime platform — all resources are K8s API objects"
    - target: stack-part:managed-postgres
      notes: "Backing store for aggregated API data-plane resources"
    - target: agent:agent-mux
      notes: "Agent dispatch bridge — runs coding agent sessions as K8s Jobs"
