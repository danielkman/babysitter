apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentdispatchruns.kradle.a5c.ai
spec:
  group: kradle.a5c.ai
  scope: Namespaced
  names:
    plural: agentdispatchruns
    singular: agentdispatchrun
    kind: AgentDispatchRun
    shortNames:
    - adr
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Board
      type: string
      jsonPath: .status.boardColumn
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        # spec/status stay preserve-unknown (free-form) for backward compatibility;
        # the core board fields below are documented + validated where set, but a
        # run that omits them is still accepted.
        properties:
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              # Human-facing card title (Commander WarRoom). Optional.
              title:
                type: string
              # Longer human-facing description. Optional.
              description:
                type: string
              # Relative scheduling priority (higher = sooner). Optional.
              priority:
                type: integer
              # Parent run for subtask decomposition: the AgentDispatchRun this
              # run is a child of. Optional; absent for top-level runs.
              parentRunRef:
                type: string
              # Per-run approval policy. requireWriteBackApproval gates write-back;
              # autoApprove (yolo) auto-approves this run's gates. Both optional.
              approvalPolicy:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                properties:
                  requireWriteBackApproval:
                    type: boolean
                  autoApprove:
                    type: boolean
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            properties:
              # Run lifecycle phase. Free-form for forward-compat, but the
              # controller reconciles it to one of the documented values.
              phase:
                type: string
                description: >-
                  Run lifecycle phase: Pending | Queued | Running |
                  AwaitingApproval | Completed | Failed | Cancelled.
              # Derived board lane for the WarRoom (set by the run-status
              # reconciler from status.phase). Optional override allowed.
              boardColumn:
                type: string
                description: >-
                  Board lane derived from phase: backlog | do | human-review |
                  approved.
              # Derived completion progress in [0,1] (queued 0, running 0.5,
              # completed 1). Set by the run-status reconciler.
              progress:
                type: number
                minimum: 0
                maximum: 1
---
