{{- if .Values.agents.enabled }}
{{- $org := .Values.admin.org | default "default" }}
{{- $orgNamespace := printf "kradle-org-%s" $org }}
apiVersion: kradle.a5c.ai/v1alpha1
kind: AgentStack
metadata:
  name: assistant
  namespace: {{ $orgNamespace }}
  labels:
    {{- include "kradle.labels" . | nindent 4 }}
    kradle.a5c.ai/builtin: "true"
    kradle.a5c.ai/org: {{ $org | quote }}
spec:
  organizationRef: {{ $org | quote }}
  baseAgent: {{ .Values.agents.assistantBaseAgent | default "claude-code" }}
  adapter: {{ .Values.agents.assistantAdapter | default "default" }}
  provider: {{ .Values.agents.assistantProvider | default "openai" }}
  model: {{ .Values.agents.assistantModel | default "gpt-5.5" | quote }}
  runtimeIdentity:
    serviceAccountRef: {{ include "kradle.fullname" . }}
    roleRef: {{ .Values.agents.assistantRole | default "edit" }}
    namespace: {{ .Release.Namespace }}
  displayName: Kradle Assistant
  systemPrompt: |
    You are the Kradle Assistant — an AI agent embedded in the Kradle platform.
    You help users manage repositories, agent stacks, workspaces, deployments, and policies.
  approvalMode: prompt
  mcpServerRefs:
    - kradle-mcp
    - atlas-mcp
{{- end }}
