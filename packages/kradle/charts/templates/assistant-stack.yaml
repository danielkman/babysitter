{{- if .Values.agents.enabled }}
{{- $org := .Values.admin.org | default "default" }}
{{- $orgNamespace := printf "kradle-org-%s" $org }}
{{- if include "kradle.orgNamespaceActive" $orgNamespace }}
apiVersion: kradle.a5c.ai/v1alpha1
kind: AgentStack
metadata:
  name: assistant
  namespace: {{ $orgNamespace }}
  labels:
    {{- include "kradle.labels" . | nindent 4 }}
    kradle.a5c.ai/builtin: "true"
    kradle.a5c.ai/org: {{ $org | quote }}
spec:
  organizationRef: {{ $org | quote }}
  baseAgent: {{ .Values.agents.assistantBaseAgent | default "claude-code" }}
  adapter: {{ .Values.agents.assistantAdapter | default "default" }}
  provider: {{ .Values.agents.assistantProvider | default "openai" }}
  model: {{ .Values.agents.assistantModel | default "gpt-5.5" | quote }}
  runtimeIdentity:
    serviceAccountRef: {{ include "kradle.fullname" . }}
    roleRef: {{ .Values.agents.assistantRole | default "edit" }}
    namespace: {{ .Release.Namespace }}
  displayName: Kradle Assistant
  systemPrompt: |
    You are the Kradle Assistant — an AI agent embedded in the Kradle platform.
    You help users manage repositories, agent stacks, workspaces, deployments, and policies.
  approvalMode: prompt
  mcpServerRefs:
    - kradle-mcp
    - atlas-mcp
  # Dispatched agent Jobs are I/O-bound — they spend almost all their time waiting
  # on the model API, not on CPU. The createAgentJob default reserves cpu:500m,
  # which both wastes capacity and makes the Job UNSCHEDULABLE on a busy cluster
  # (staging runs ~98% CPU; a board dispatch would sit Pending forever with
  # "Insufficient cpu"). Request a small floor and let it burst to the limit.
  resources:
    requests:
      cpu: {{ .Values.agents.assistantCpuRequest | default "25m" | quote }}
      memory: {{ .Values.agents.assistantMemoryRequest | default "512Mi" | quote }}
    limits:
      cpu: {{ .Values.agents.assistantCpuLimit | default "1500m" | quote }}
      memory: {{ .Values.agents.assistantMemoryLimit | default "2Gi" | quote }}
{{- end }}
{{- end }}
