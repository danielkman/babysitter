{{- if .Values.agents.enabled }}
{{- $org := .Values.admin.org | default "default" }}
{{- $orgNamespace := printf "kradle-org-%s" $org }}
{{- if include "kradle.orgNamespaceActive" $orgNamespace }}
{{- $labels := include "kradle.labels" . }}
# Agent dispatch Jobs run in the org namespace (kradle-org-<org>), but K8s
# Secret references (envFrom and imagePullSecrets) are namespace-scoped. The
# model-provider secret and the registry pull secret are managed in the release
# namespace, so project copies into the org namespace here. helm upgrade
# resolves the lookups against the live cluster; rotations in the source secrets
# propagate to the org copies on the next deploy.
{{- $names := list }}
{{- if .Values.assistant.existingSecret }}
{{- $names = append $names .Values.assistant.existingSecret }}
{{- end }}
{{- range .Values.global.imagePullSecrets }}
{{- if .name }}
{{- $names = append $names .name }}
{{- end }}
{{- end }}
{{- range $name := ($names | uniq) }}
{{- $src := lookup "v1" "Secret" $.Release.Namespace $name }}
{{- if $src }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $orgNamespace }}
  labels:
    {{- $labels | nindent 4 }}
    kradle.a5c.ai/builtin: "true"
    kradle.a5c.ai/org: {{ $org | quote }}
type: {{ $src.type | default "Opaque" }}
{{- with $src.data }}
data:
{{ toYaml . | indent 2 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
