            {{- range $key := list "AZURE_API_KEY" "AGENT_MUX_API_BASE" "KRADLE_ASSISTANT_PROVIDER" "KRADLE_ASSISTANT_MODEL" "OPENAI_API_KEY" "GOOGLE_API_KEY" }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
