apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kradle.fullname" . }}-web
  labels:
    {{- include "kradle.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "kradle.fullname" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "kradle.webImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: KRADLE_ORG
              value: {{ .Values.admin.org | quote }}
            - name: KRADLE_ADMIN_ORG
              value: {{ .Values.admin.org | quote }}
            - name: KRADLE_ADMIN_USERNAME
              value: {{ .Values.admin.username | quote }}
