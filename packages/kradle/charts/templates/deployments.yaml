                  optional: true
              {{- else }}
              value: {{ $natsUrl | quote }}
              {{- end }}
            - name: KRADLE_EVENT_NATS_SUBJECT
              value: {{ $natsEvents.subject | default "kradle.events" | quote }}
            - name: KRADLE_EVENT_NATS_STREAM
              value: {{ $natsEvents.stream | default "KRADLE_EVENTS" | quote }}
            - name: KRADLE_EVENT_REQUIRE_BROKER
              value: {{ $natsEvents.requireBroker | default false | quote }}
            {{- end }}
            {{- if $assistantAnthropic.existingSecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $assistantAnthropic.existingSecret | quote }}
                  key: {{ default "anthropic-api-key" $assistantAnthropic.key | quote }}
                  optional: true
            {{- end }}
            {{- if $assistantKradle.existingSecret }}
            - name: KRADLE_ASSISTANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $assistantKradle.existingSecret | quote }}
                  key: {{ default "kradle-assistant-api-key" $assistantKradle.key | quote }}
                  optional: true
            {{- end }}
            {{- with .Values.assistant }}
