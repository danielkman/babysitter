apiVersion: v1
kind: Service
metadata:
  name: {{ include "kradle.fullname" . }}-api
  labels:
    {{- include "kradle.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kradle.fullname" . }}-web
spec:
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
    # Scope to kradle's own web pods. Subcharts (jitsi) can share
    # instance+component=web, so without this the Service would also select their
    # nginx pods and route ~half of web traffic there (intermittent 405s).
    kradle.a5c.ai/service: web